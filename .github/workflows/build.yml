name: Flutter CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    name: Build Flutter App
    runs-on: ubuntu-latest  # Use macos-latest for iOS builds

    steps:
      # ✅ Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ✅ Setup Flutter (Fix: Use version 3.29.0)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.0"  # Updated to a compatible version
          cache: true

      # ✅ Install dependencies
      - name: Install Dependencies
        run: flutter pub get

      # ✅ Analyze the code
      - name: Analyze Code
        run: flutter analyze

      # ✅ Run Tests (Optional)
      - name: Run Tests
        run: flutter test

      # ✅ Build APK (Android)
      - name: Build APK
        run: flutter build apk --release

      # ✅ Build AppBundle (For Play Store)
      - name: Build AppBundle
        run: flutter build appbundle --release

      # ✅ Upload APK as an Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # ✅ Upload AAB as an Artifact
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

      # ✅ Firebase App Distribution (Optional)
      - name: Deploy to Firebase App Distribution
        if: success()
        run: |
          curl -sL firebase.tools | bash
          firebase login:ci --token ${{ secrets.FIREBASE_TOKEN }}
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app ${{ secrets.FIREBASE_APP_ID }} \
            --groups testers  
